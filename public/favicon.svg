<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3FA8"/>
      <stop offset="100%" stop-color="#0B1C3E"/>
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#93B8FF"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Blue accent stripe top-left -->
  <rect x="0" y="0" width="6" height="64" rx="14" fill="#3B6FD4" opacity="0.5"/>
  <!-- B letterform — simplified from BODEX logo geometry -->
  <!-- Left vertical bar -->
  <rect x="16" y="14" width="6" height="36" rx="2" fill="url(#icon)"/>
  <!-- Top bump -->
  <rect x="22" y="14" width="13" height="5" rx="2" fill="url(#icon)"/>
  <rect x="35" y="14" width="5" height="14" rx="2" fill="url(#icon)"/>
  <!-- Middle bar -->
  <rect x="22" y="28" width="11" height="5" rx="2" fill="url(#icon)"/>
  <!-- Bottom bump -->
  <rect x="22" y="44" width="14" height="5" rx="2" fill="url(#icon)"/>
  <rect x="36" y="33" width="5" height="16" rx="2" fill="url(#icon)"/>
  <!-- Accent dot — electric blue -->
  <circle cx="49" cy="49" r="5" fill="#60A5FA"/>
</svg>
