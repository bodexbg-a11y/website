<svg width="160" height="60" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Building blocks icon -->
  <g transform="translate(0, 5)">
    <!-- Left column -->
    <rect x="2" y="24" width="12" height="26" rx="1" fill="#4060d8"/>
    <!-- Center-left column -->
    <rect x="17" y="14" width="12" height="36" rx="1" fill="#3547b8"/>
    <!-- Center column (tallest) -->
    <rect x="32" y="4" width="14" height="46" rx="1" fill="#4060d8"/>
    <!-- Center-right column -->
    <rect x="49" y="14" width="12" height="36" rx="1" fill="#3547b8"/>
    <!-- Right column -->
    <rect x="64" y="24" width="12" height="26" rx="1" fill="#4060d8"/>
    <!-- Roof/top triangle lines -->
    <polyline points="8,24 39,6 78,24" fill="none" stroke="#2235a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- BODEX text -->
  <text x="85" y="34" font-family="Montserrat,sans-serif" font-size="18" font-weight="900" fill="#1a2a6c" letter-spacing="-0.5">BODEX</text>
  <!-- BULGARIA text -->
  <text x="85" y="50" font-family="Montserrat,sans-serif" font-size="9" font-weight="600" fill="#3547b8" letter-spacing="3">BULGARIA</text>
</svg>
